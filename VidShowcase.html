<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        video {
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            background: #000;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        p {
            margin-top: 15px;
            color: #666;
            font-size: 0.9em;
        }

        /* Extra spacing on very small screens */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Video</h1>
        
        <video controls preload="metadata" playsinline>
            <source src="https://videotourl.com/videos/1783391232501-aa3f6e31-c580-4577-8284-57446e291c42.mp4" 
                    type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <p><small>Video from GitHub-hosted website</small></p>
    </div>
</body>
</html>
